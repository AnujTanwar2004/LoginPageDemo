<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register | Skyline Auth</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/assets/css/auth.css" />
  </head>
  <body>
    <main class="auth-layout">
      <section class="brand-panel">
        <p class="tag">Skyline Secure</p>
        <h1>Create your account in seconds.</h1>
        <p class="subtext">Use this starter for Azure Web App, Azure VM, AWS EC2, and DynamoDB setups.</p>
      </section>

      <section class="form-panel">
        <form id="register-form" class="glass-card" autocomplete="on">
          <h2>Create Account</h2>
          <p class="muted">Get access to your responsive hero dashboard.</p>

          <label for="name">Full Name</label>
          <input id="name" name="name" type="text" required placeholder="Vinay Raj" />

          <label for="email">Email</label>
          <input id="email" name="email" type="email" required placeholder="you@example.com" />

          <label for="password">Password</label>
          <input id="password" name="password" type="password" minlength="8" required placeholder="At least 8 characters" />

          <button type="submit">Register</button>
          <p id="message" class="message" role="alert"></p>

          <p class="switch-link">Already have an account? <a href="/login">Sign in</a></p>
        </form>
      </section>
    </main>

    <script src="/assets/js/register.js"></script>
  </body>
</html>
