<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Skyline Auth</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/assets/css/auth.css" />
  </head>
  <body>
    <main class="auth-layout">
      <section class="brand-panel">
        <p class="tag">Skyline Secure</p>
        <h1>Welcome back to your launchpad.</h1>
        <p class="subtext">Secure login, modern UI, and cloud-ready deployment in one compact stack.</p>
      </section>

      <section class="form-panel">
        <form id="login-form" class="glass-card" autocomplete="on">
          <h2>Sign In</h2>
          <p class="muted">Continue to your personalized hero page.</p>

          <label for="email">Email</label>
          <input id="email" name="email" type="email" required placeholder="you@example.com" />

          <label for="password">Password</label>
          <input id="password" name="password" type="password" required placeholder="At least 8 characters" />

          <button type="submit">Login</button>
          <p id="message" class="message" role="alert"></p>

          <p class="switch-link">No account yet? <a href="/register">Create one</a></p>
        </form>
      </section>
    </main>

    <script src="/assets/js/login.js"></script>
  </body>
</html>
